id: contracts-auth-ts
language: typescript
layer: library

tasks:
  build:
    command: 'protoc --plugin=protoc-gen-ts_proto=./node_modules/.bin/protoc-gen-ts_proto --ts_proto_out=./src/generated --proto_path=../contracts-auth-proto/src ../contracts-auth-proto/src/*.proto'
    inputs:
      - '/packages/contracts-auth-proto/src/*.proto'
    outputs:
      - 'src/generated/*.ts'
    options:
      shell: true
      cache: true
      runInCI: false
