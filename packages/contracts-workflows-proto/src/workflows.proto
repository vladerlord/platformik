syntax = "proto3";

package platformik.workflows.v1;

import "google/protobuf/struct.proto";
import "primitives.proto";

// ── Shared domain types ────────────────────────────────────────────────────

message WorkflowSummary {
  platformik.primitives.v1.UUID id    = 1;
  string                        title = 2;
}

enum NodeType {
  NODE_TYPE_UNSPECIFIED      = 0;
  NODE_TYPE_START            = 1;
  NODE_TYPE_OPTION_SELECTION = 2;
  NODE_TYPE_SEND_MESSAGE     = 3;
  NODE_TYPE_END              = 4;
}

enum WorkflowRunStatus {
  WORKFLOW_RUN_STATUS_UNSPECIFIED = 0;
  WORKFLOW_RUN_STATUS_RUNNING     = 1;
  WORKFLOW_RUN_STATUS_COMPLETED   = 2;
  WORKFLOW_RUN_STATUS_FAILED      = 3;
}

enum MessageRole {
  MESSAGE_ROLE_UNSPECIFIED = 0;
  MESSAGE_ROLE_USER        = 1;
  MESSAGE_ROLE_SYSTEM      = 2;
}

message ConversationMessage {
  platformik.primitives.v1.UUID id              = 1;
  platformik.primitives.v1.UUID conversation_id = 2;
  platformik.primitives.v1.UUID run_id          = 3;
  MessageRole                   role            = 4;
  google.protobuf.Struct        content         = 5;
}

message Option {
  string id    = 1;
  string label = 2;
}

message OptionInput {
  string          label   = 1;
  repeated Option options = 2;
}

message PendingInput {
  oneof input {
    OptionInput option_input = 1;
  }
}

// ── ListWorkflows ──────────────────────────────────────────────────────────

message ListWorkflowsRequest {}

message ListWorkflowsResponse {
  repeated WorkflowSummary workflows = 1;
}

// ── StartWorkflow ──────────────────────────────────────────────────────────

message StartWorkflowRequest {
  platformik.primitives.v1.UUID workflow_id = 1;
}

message StartWorkflowResponse {
  platformik.primitives.v1.UUID workflow_run_id      = 1;
  platformik.primitives.v1.UUID conversation_id      = 2;
  string                        temporal_workflow_id = 3;
}

// ── GetWorkflowRunView ─────────────────────────────────────────────────────

message GetWorkflowRunViewRequest {
  platformik.primitives.v1.UUID          workflow_run_id = 1;
  optional platformik.primitives.v1.UUID after_id        = 2; // absent = full history
}

message GetWorkflowRunViewResponse {
  platformik.primitives.v1.UUID        conversation_id  = 1;
  WorkflowRunStatus                    status           = 2;
  string                               current_node_id  = 3;
  uint64                               revision         = 4;
  optional platformik.primitives.v1.UUID last_message_id = 5; // absent if no messages yet
  repeated ConversationMessage         messages         = 6;
  optional PendingInput                pending_input    = 7;
}

// ── SubmitAnswer ───────────────────────────────────────────────────────────

message SelectOptionAnswer {
  oneof value {
    string option_id = 1; // resolved option id — for clients that resolve locally (CLI, web)
    string raw_input = 2; // raw user text — for clients that delegate resolution to the server (Telegram, SMS)
  }
}

message SubmitAnswerRequest {
  platformik.primitives.v1.UUID workflow_run_id = 1;
  oneof answer {
    SelectOptionAnswer select_option = 2;
  }
}

message SubmitAnswerResponse {}

// ── Service ────────────────────────────────────────────────────────────────

service WorkflowsService {
  rpc ListWorkflows      (ListWorkflowsRequest)      returns (ListWorkflowsResponse);
  rpc StartWorkflow      (StartWorkflowRequest)      returns (StartWorkflowResponse);
  rpc GetWorkflowRunView (GetWorkflowRunViewRequest) returns (GetWorkflowRunViewResponse);
  rpc SubmitAnswer       (SubmitAnswerRequest)       returns (SubmitAnswerResponse);
}
