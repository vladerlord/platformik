services:
  postgres-test:
    image: postgres:18.1-alpine
    ports:
      - '52100:5432'
    restart: 'no'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U platformik-user -d platformik_iam_test']
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: platformik-user
      POSTGRES_PASSWORD: platformik-password
      POSTGRES_DB: platformik_iam_test

  redis-test:
    image: redis:7-alpine
    ports:
      - '52101:6379'
    restart: 'no'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
