id: tooling-eslint
language: typescript
layer: tool

tasks:
  build:
    command: 'esbuild plugin-module-boundaries/index.ts --bundle --platform=node --format=esm --outfile=plugin-module-boundaries.js'
    inputs:
      - 'plugin-module-boundaries/**/*.ts'
    outputs:
      - 'plugin-module-boundaries.js'

  lint:
    deps:
      - build
    options:
      mergeArgs: append
      mergeDeps: append

  lint-fix:
    deps:
      - build
    options:
      mergeArgs: append
      mergeDeps: append

  test:
    deps:
      - build
    options:
      mergeDeps: append
