id: tooling-eslint
language: typescript
layer: tool

tasks:
  build:
    command: 'bun build plugin-module-boundaries/index.ts --outfile plugin-module-boundaries.js --target node'
    inputs:
      - 'plugin-module-boundaries/**/*.ts'
    outputs:
      - 'plugin-module-boundaries.js'

  lint:
    deps:
      - build
    options:
      mergeArgs: append
      mergeDeps: append

  lint-fix:
    deps:
      - build
    options:
      mergeArgs: append
      mergeDeps: append

  test:
    deps:
      - build
    options:
      mergeDeps: append
