monorepoScope: '@platformik'

langs: [ts, py, go, rs, kt, sw]
schemas: [proto, jsonschema]
packageRoles:
  [lib, domain, ports, contracts, module, workflows, adapter, runtime, vendor, migrations, testkit]

rules:
  lib:
    mode: allow
    packages:
      ts: [neverthrow]

  module:
    mode: allow_any

  contracts:
    mode: allow
    packages:
      ts: [zod, '@bufbuild/protobuf']
      rs: [serde, prost]
      go: [google.golang.org/protobuf]
      py: [pydantic]

  runtime:
    mode: allow_any

  vendor:
    mode: allow_any

  app:
    mode: allow_any
