info:
  name: sign-in
  type: http
  seq: 2

http:
  method: POST
  url: '{{baseUrl}}/auth/sign-in'
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {
        "email": "{{email}}",
        "password": "{{password}}"
      }
  auth: none

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
