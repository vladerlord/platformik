info:
  name: sign-up
  type: http
  seq: 1

http:
  method: POST
  url: '{{baseUrl}}/auth/sign-up'
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Vlad",
        "email": "{{email}}",
        "password": "{{password}}"
      }
  auth: none

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
