id: bff-web-platform-ts
language: typescript
layer: application

fileGroups:
  sources:
    - glob: 'src/**/*'
      cache: true
    - glob: 'bin/*'
      cache: true
    - glob: '/packages/**/*'
      cache: true
    - file: 'package.json'
    - file: 'tsconfig.json'

tasks:
  dev:
    command: mise x -- bun run --watch bin/server.ts
    inputs:
      - '@group(sources)'
  migrate:
    command: 'mise x -- bun bin/migrate-iam.ts'
