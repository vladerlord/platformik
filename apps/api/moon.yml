id: api
language: typescript
layer: application

fileGroups:
  sources:
    - glob: 'src/**/*'
      cache: true
    - glob: 'bin/*'
      cache: true
    - glob: '/packages/**/*'
      cache: true
    - file: 'package.json'
    - file: 'tsconfig.json'

tasks:
  server:
    command: mise x -- tsx watch bin/server.ts
    inputs:
      - '@group(sources)'
    options:
      runInCI: false
      persistent: true

  migrate:
    command: 'mise x -- tsx bin/migrate.ts'
    options:
      cache: false

  seed:
    command: 'mise x -- tsx bin/seed.ts'
    options:
      cache: false
      runInCI: false
