id: web-platform-ts
language: typescript
layer: application

tasks:
  typecheck:
    command: 'svelte-check --tsconfig tsconfig.json'
    inputs:
      - 'src/**/*.{ts,svelte}'
      - 'tsconfig.json'
    options:
      cache: true
      runInCI: true

  dev:
    command: 'vite dev'
    options:
      cache: false
      runInCI: false
      persistent: true

  build:
    command: 'vite build'
    inputs:
      - 'src/**'
      - 'static/**'
      - 'svelte.config.js'
      - 'vite.config.ts'
    options:
      cache: true
      runInCI: true
