services:
  postgres-18.1:
    image: postgres:18.1-alpine
    volumes:
      - postgres-18.1:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - '52000:5432'
    restart: 'no'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U platformik-user -d postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: platformik-user
      POSTGRES_PASSWORD: platformik-password
      POSTGRES_DB: platformik

volumes:
  postgres-18.1:
