services:
  postgres-18.1:
    image: postgres:18.1-alpine
    volumes:
      - postgres-18.1:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - '52000:5432'
    restart: 'no'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U platformik-user -d postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: platformik-user
      POSTGRES_PASSWORD: platformik-password
      POSTGRES_DB: platformik

  temporal:
    image: temporalio/temporal:latest
    ports:
      - '7233:7233'
      - '8233:8233'
    restart: 'no'
    command: ['server', 'start-dev', '--ip', '0.0.0.0', '--namespace', 'default']

  nats:
    image: nats:2.11-alpine
    command: ['-js', '-m', '8222']
    ports:
      - '4222:4222'
      - '8222:8222'
    restart: 'no'

volumes:
  postgres-18.1:
