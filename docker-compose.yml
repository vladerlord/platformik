services:
  postgres-18.1:
    image: postgres:18.1-alpine
    volumes:
      - postgres-18.1:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - '52000:5432'
    restart: 'no'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U platformik-user -d postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: platformik-user
      POSTGRES_PASSWORD: platformik-password
      POSTGRES_DB: platformik

  redis-7:
    image: redis:7-alpine
    ports:
      - '52001:6379'
    restart: 'no'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/temporal:latest
    ports:
      - '7233:7233'
      - '8233:8233'
    restart: 'no'
    command: ['server', 'start-dev', '--ip', '0.0.0.0', '--namespace', 'default']

volumes:
  postgres-18.1:
